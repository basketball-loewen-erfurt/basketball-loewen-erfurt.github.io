document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

01, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"2a1438b7-e442-44ab-b6be-6ad2f7fb2c4e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"99606e93-d331-47da-88d6-eca6caefa843\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---- Marken-Primitive (Styleguide-kanonisch) ---- */\n  --color-brand-orange: #E5710B;\n  --color-brand-blue:   #0028AA;\n  --color-brand-violet: #1E2064;\n  --color-brand-navy:   #00122D;\n\n  /* ---- Orange-Stufen ---- */\n  --color-orange-50:  #FDF1E6;\n  --color-orange-100: #FBDDC0;\n  --color-orange-200: #F6BE86;\n  --color-orange-300: #F09E4C;\n  --color-orange-400: #EB8524;\n  --color-orange-500: #E5710B;\n  --color-orange-600: #C25E09;\n  --color-orange-700: #964808;\n  --color-orange-800: #6B340A;\n  --color-orange-900: #41210A;\n\n  /* ---- Blau-Stufen ---- */\n  --color-blue-50:  #E7ECFB;\n  --color-blue-100: #C3D0F4;\n  --color-blue-200: #8AA2E7;\n  --color-blue-300: #5174D7;\n  --color-blue-400: #1E4AC3;\n  --color-blue-500: #0028AA;\n  --color-blue-600: #00228E;\n  --color-blue-700: #001B70;\n  --color-blue-800: #001451;\n  --color-blue-900: #000C30;\n\n  /* ---- Neutrale Graustufen ---- */\n  --color-white:       #FFFFFF;\n  --color-neutral-50:  #F6F7F9;\n  --color-neutral-100: #ECEEF2;\n  --color-neutral-200: #DDE1E9;\n  --color-neutral-300: #C2C8D5;\n  --color-neutral-400: #9AA3B5;\n  --color-neutral-500: #6B7488;\n  --color-neutral-600: #4B5468;\n  --color-neutral-700: #353C4D;\n  --color-neutral-800: #222838;\n  --color-neutral-900: #121726;\n\n  /* ---- Status ---- */\n  --color-success:    #168A52;\n  --color-success-bg: #E6F4EC;\n  --color-warning:    #E8A400;\n  --color-warning-bg: #FCF3D9;\n  --color-error:      #C62828;\n  --color-error-bg:   #FBEAEA;\n  --color-info:       #0028AA;\n  --color-info-bg:    #E7ECFB;\n\n  /* ---- Semantische Rollen (hell-orientiert) ---- */\n  --bg-page:        var(--color-white);\n  --bg-subtle:      var(--color-neutral-50);\n  --bg-muted:       var(--color-neutral-100);\n  --border:         var(--color-neutral-200);\n  --text-primary:   var(--color-brand-navy);\n  --text-secondary: var(--color-neutral-600);\n  --text-muted:     var(--color-neutral-500);\n  --text-on-dark:   var(--color-white);   /* NUR auf dunklen Flächen verwenden */\n  --action-primary: var(--color-orange-600); /* Button-Fläche mit weißer Schrift (AA) */\n  --link:           var(--color-brand-blue);\n  --focus-ring:     var(--color-brand-blue);\n\n  /* ---- Verläufe (Akzent, nicht Seitenhintergrund) ---- */\n  --gradient-blue:   radial-gradient(110% 100% at 100% 0%, #0028AA 0%, #00122D 100%);\n  --gradient-violet: radial-gradient(110% 100% at 100% 0%, #1E2064 0%, #00122D 100%);\n\n  /* ---- Typografie ---- */\n  --font-base: 'Lexend', system-ui, sans-serif;\n  --font-display: 'Lexend', system-ui, sans-serif; /* Headlines: weight 900, Satzschreibweise */\n\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-extrabold: 800;\n  --weight-black: 900;\n\n  --text-display: 4.5rem;\n  --text-h1: 3rem;\n  --text-h2: 2.25rem;\n  --text-h3: 1.5rem;\n  --text-h4: 1.25rem;\n  --text-body-lg: 1.125rem;\n  --text-body: 1rem;\n  --text-body-sm: 0.875rem;\n  --text-caption: 0.75rem;\n\n  --tracking-display: -0.025em;\n  --tracking-heading: -0.02em;\n  --tracking-normal: 0em;\n  --tracking-label: 0.16em;\n\n  --leading-tight: 1.0;\n  --leading-snug: 1.2;\n  --leading-normal: 1.6;\n\n  /* ---- Spacing (4px-Raster) ---- */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;  --space-4: 16px;\n  --space-5: 20px;  --space-6: 24px;  --space-8: 32px;  --space-10: 40px;\n  --space-12: 48px; --space-16: 64px; --space-20: 80px; --space-24: 96px;\n\n  /* ---- Radien ---- */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-full: 9999px;\n\n  /* ---- Schatten ---- */\n  --shadow-card: 0 12px 30px rgba(0, 18, 45, 0.10);\n}\n\n/* ---- Basis-Defaults (optional) ---- */\nbody {\n  font-family: var(--font-base);\n  font-weight: var(--weight-light);\n  color: var(--text-primary);\n  background: var(--bg-page);\n  line-height: var(--leading-normal);\n}\n\n/* Headlines: Lexend Black, Satzschreibweise (KEIN Versal-Geschrei) */\n.display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-black);\n  letter-spacing: var(--tracking-display);\n  line-height: var(--leading-tight);\n}\n\n/* Signatur: Schlüsselwort in Orange (+ Swoosh als SVG darunter, sparsam einsetzen) */\n.keyword { color: var(--color-brand-orange); }\n<\u002Fstyle>\n<style>/* =====================================================================\n   Basketball Löwen — colors_and_type.css\n   Single stylesheet: design tokens (CSS custom properties) + semantic\n   typography. Source of truth: brand_source/BRAND.md + tokens/tokens.json.\n   Hell-orientiert (\"light first\"): Navy is TEXT, not background.\n   Dark gradients are accents only (hero / values band / footer).\n   ===================================================================== */\n\n/* Hausschrift — Lexend, self-hosted (fonts/). Built for readability/access,\n   which mirrors the club's mission (Chancengerechtigkeit).\n   Paths assume this stylesheet sits at project root; from a subfolder, the\n   relative ../fonts path still resolves because the @font-face URLs below are\n   resolved relative to THIS file. */\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 300; font-display: swap; src: url(\"67dcfe5d-dd8d-47f9-be4a-fbe5006b06a6\") format('truetype'); }\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 400; font-display: swap; src: url(\"d9d3e953-da2e-44bb-a1e0-ec885e3b7eab\") format('truetype'); }\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 500; font-display: swap; src: url(\"ba73848f-ec40-4e4b-867e-bfbb795b058b\") format('truetype'); }\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 600; font-display: swap; src: url(\"6f52185c-b64a-4666-a7cc-847b680c2d81\") format('truetype'); }\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 700; font-display: swap; src: url(\"698dd6be-48f0-4167-82f3-402834012bf0\") format('truetype'); }\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 800; font-display: swap; src: url(\"637b8c36-89b4-4789-84d0-64eaad73cecc\") format('truetype'); }\n@font-face { font-family: 'Lexend'; font-style: normal; font-weight: 900; font-display: swap; src: url(\"999b2a59-8f54-4e31-b22f-3cdb863a08da\") format('truetype'); }\n\n:root {\n  /* ---------- Brand primitives (styleguide-canonical) ---------- */\n  --color-brand-orange: #E5710B;\n  --color-brand-blue:   #0028AA;\n  --color-brand-violet: #1E2064;\n  --color-brand-navy:   #00122D;\n\n  /* ---------- Orange scale ---------- */\n  --color-orange-50:  #FDF1E6;\n  --color-orange-100: #FBDDC0;\n  --color-orange-200: #F6BE86;\n  --color-orange-300: #F09E4C;\n  --color-orange-400: #EB8524;\n  --color-orange-500: #E5710B;\n  --color-orange-600: #C25E09;\n  --color-orange-700: #964808;\n  --color-orange-800: #6B340A;\n  --color-orange-900: #41210A;\n\n  /* ---------- Blue scale ---------- */\n  --color-blue-50:  #E7ECFB;\n  --color-blue-100: #C3D0F4;\n  --color-blue-200: #8AA2E7;\n  --color-blue-300: #5174D7;\n  --color-blue-400: #1E4AC3;\n  --color-blue-500: #0028AA;\n  --color-blue-600: #00228E;\n  --color-blue-700: #001B70;\n  --color-blue-800: #001451;\n  --color-blue-900: #000C30;\n\n  /* ---------- Neutral scale (cool, biased toward navy) ---------- */\n  --color-white:       #FFFFFF;\n  --color-neutral-50:  #F6F7F9;\n  --color-neutral-100: #ECEEF2;\n  --color-neutral-200: #DDE1E9;\n  --color-neutral-300: #C2C8D5;\n  --color-neutral-400: #9AA3B5;\n  --color-neutral-500: #6B7488;\n  --color-neutral-600: #4B5468;\n  --color-neutral-700: #353C4D;\n  --color-neutral-800: #222838;\n  --color-neutral-900: #121726;\n\n  /* ---------- Status ---------- */\n  --color-success:    #168A52;  --color-success-bg: #E6F4EC;\n  --color-warning:    #E8A400;  --color-warning-bg: #FCF3D9;\n  --color-error:      #C62828;  --color-error-bg:   #FBEAEA;\n  --color-info:       #0028AA;  --color-info-bg:    #E7ECFB;\n\n  /* ---------- Semantic roles (light-oriented) ---------- */\n  --bg-page:        var(--color-white);\n  --bg-subtle:      var(--color-neutral-50);\n  --bg-muted:       var(--color-neutral-100);\n  --border:         var(--color-neutral-200);\n  --border-strong:  var(--color-neutral-300);\n  --text-primary:   var(--color-brand-navy);\n  --text-secondary: var(--color-neutral-600);\n  --text-muted:     var(--color-neutral-500);\n  --text-on-dark:   var(--color-white);      /* ONLY on dark surfaces */\n  --action-primary: var(--color-orange-600); /* button fill w/ white text (AA) */\n  --action-primary-hover: #A04D07;\n  --link:           var(--color-brand-blue);\n  --focus-ring:     var(--color-brand-blue);\n\n  /* ---------- Gradients (accent surfaces, NOT page bg) ---------- */\n  --gradient-blue:   radial-gradient(110% 100% at 100% 0%, #0028AA 0%, #00122D 100%);\n  --gradient-violet: radial-gradient(110% 100% at 100% 0%, #1E2064 0%, #00122D 100%);\n\n  /* ---------- Type families ---------- */\n  --font-base:    'Lexend', system-ui, sans-serif;\n  --font-display: 'Lexend', system-ui, sans-serif; /* weight 900, sentence case */\n  --font-mono:    ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;\n\n  /* ---------- Weights ---------- */\n  --weight-light: 300;     /* body copy */\n  --weight-regular: 400;\n  --weight-medium: 500;    /* UI / labels */\n  --weight-semibold: 600;  /* buttons / emphasis */\n  --weight-bold: 700;\n  --weight-extrabold: 800; /* section titles */\n  --weight-black: 900;     /* display / headlines */\n\n  /* ---------- Type scale ---------- */\n  --text-display: 4.5rem;   /* 72 */\n  --text-h1: 3rem;          /* 48 */\n  --text-h2: 2.25rem;       /* 36 */\n  --text-h3: 1.5rem;        /* 24 */\n  --text-h4: 1.25rem;       /* 20 */\n  --text-body-lg: 1.125rem; /* 18 */\n  --text-body: 1rem;        /* 16 */\n  --text-body-sm: 0.875rem; /* 14 */\n  --text-caption: 0.75rem;  /* 12 */\n\n  /* ---------- Tracking / leading ---------- */\n  --tracking-display: -0.025em;\n  --tracking-heading: -0.02em;\n  --tracking-normal: 0em;\n  --tracking-label: 0.16em;   /* eyebrows / labels, UPPERCASE */\n  --leading-tight: 1.0;\n  --leading-snug: 1.2;\n  --leading-normal: 1.6;\n\n  /* ---------- Spacing (4px grid) ---------- */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;  --space-4: 16px;\n  --space-5: 20px;  --space-6: 24px;  --space-8: 32px;  --space-10: 40px;\n  --space-12: 48px; --space-16: 64px; --space-20: 80px; --space-24: 96px;\n\n  /* ---------- Radii ---------- */\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-full: 9999px;\n\n  /* ---------- Shadows (soft, navy-tinted, on light) ---------- */\n  --shadow-xs:   0 1px 2px rgba(0, 18, 45, 0.06);\n  --shadow-sm:   0 2px 8px rgba(0, 18, 45, 0.06);\n  --shadow-card: 0 12px 30px rgba(0, 18, 45, 0.10);\n  --shadow-lg:   0 24px 60px rgba(0, 18, 45, 0.14);\n\n  /* ---------- Motion ---------- */\n  --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);\n  --dur-fast: 0.15s;\n  --dur-med: 0.25s;\n}\n\n/* =====================================================================\n   Semantic typography — apply these classes (or copy the rules).\n   Headlines: Lexend Black, SENTENCE CASE WITH A PERIOD (\"Hier wirst du groß.\")\n   — that restraint IS the tone of voice. No all-caps shouting.\n   ===================================================================== */\n\n.t-display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-black);\n  font-size: var(--text-display);\n  letter-spacing: var(--tracking-display);\n  line-height: var(--leading-tight);\n  color: var(--text-primary);\n}\n.t-h1 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-black);\n  font-size: var(--text-h1);\n  letter-spacing: var(--tracking-display);\n  line-height: var(--leading-snug);\n  color: var(--text-primary);\n}\n.t-h2 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-extrabold);\n  font-size: var(--text-h2);\n  letter-spacing: var(--tracking-heading);\n  line-height: var(--leading-snug);\n  color: var(--text-primary);\n}\n.t-h3 {\n  font-family: var(--font-base);\n  font-weight: var(--weight-extrabold);\n  font-size: var(--text-h3);\n  letter-spacing: var(--tracking-heading);\n  line-height: var(--leading-snug);\n  color: var(--text-primary);\n}\n.t-h4 {\n  font-family: var(--font-base);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-h4);\n  line-height: var(--leading-snug);\n  color: var(--text-primary);\n}\n.t-body-lg {\n  font-family: var(--font-base);\n  font-weight: var(--weight-light);\n  font-size: var(--text-body-lg);\n  line-height: var(--leading-normal);\n  color: var(--text-secondary);\n}\n.t-body {\n  font-family: var(--font-base);\n  font-weight: var(--weight-light);\n  font-size: var(--text-body);\n  line-height: var(--leading-normal);\n  color: var(--text-secondary);\n}\n.t-body-sm {\n  font-family: var(--font-base);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-body-sm);\n  line-height: var(--leading-normal);\n  color: var(--text-secondary);\n}\n/* Eyebrow / label — UPPERCASE, wide tracking, usually orange */\n.t-eyebrow {\n  font-family: var(--font-base);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-caption);\n  letter-spacing: var(--tracking-label);\n  text-transform: uppercase;\n  color: var(--color-brand-orange);\n}\n.t-caption {\n  font-family: var(--font-base);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-caption);\n  line-height: var(--leading-normal);\n  color: var(--text-muted);\n}\n.t-mono {\n  font-family: var(--font-mono);\n  font-size: var(--text-body-sm);\n}\n\n/* The signature: ONE keyword of a headline in orange (used sparingly). */\n.t-keyword { color: var(--color-brand-orange); }\n\n/* Links */\na { color: var(--link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\n/* Optional element defaults — opt in by importing this on a plain page. */\n.ds-defaults {\n  font-family: var(--font-base);\n  font-weight: var(--weight-light);\n  color: var(--text-primary);\n  background: var(--bg-page);\n  line-height: var(--leading-normal);\n}\n<\u002Fstyle>\n<script src=\"1556fc21-643b-498c-bf84-432a31b89dde\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"box-sizing:border-box; background:transparent; font-family:Lexend,system-ui,sans-serif; color:#00122D; padding:0;\">\n  <div style=\"padding:0;\">\n\n    <div style=\"overflow-x:auto;\">\n    <div ref=\"{{ stageRef }}\" onmousemove=\"{{ onMove }}\" onmouseleave=\"{{ onLeave }}\" style=\"position:relative; width:100%; min-width:1180px;\">\n\n      <div style=\"background:#F9FAFB; border:2.5px solid rgba(0,18,45,.4); border-radius:18px; padding:16px; box-shadow:0 16px 40px rgba(0,18,45,.08);\">\n        <div style=\"display:flex; gap:10px; align-items:stretch;\">\n\n          <div style=\"width:96px; flex:none; display:flex; flex-direction:column; gap:10px;\">\n            <div style=\"height:250px; box-sizing:border-box; background:rgba(0,18,45,.06); border:1.5px solid rgba atBg.FC }}\" style=\"width:100%; height:100%; object-fit:fill; display:block;\"><\u002Fdiv><div style=\"position:relative; z-index:1; font-weight:700; font-size:11px; background:rgba(255,255,255,.85); border-radius:6px; padding:2px 10px;\">Block C<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"height:126px; display:flex; gap:10px;\">\n              <div data-block=\"A\" onclick=\"{{ onPick }}\" onmouseenter=\"{{ onEnter }}\" style=\"flex:1; position:relative; box-sizing:border-box; border-radius:8px; background:rgba(0,18,45,.05); border:1.5px solid rgba(0,18,45,.5); cursor:pointer; overflow:hidden; display:flex; align-items:center; justify-content:center; transition:transform .15s ease-out, box-shadow .15s ease-out; box-shadow: {{ rings.A }};\" style-hover=\"transform:translateY(-3px)\"><div style=\"position:absolute; inset:8px;\"><img src=\"{{ seatBg.A }}\" style=\"width:100%; height:100%; object-fit:fill; display:block;\"><\u002Fdiv><div style=\"position:relative; z-index:1; background:rgba(255,255,255,.8); border:1px solid rgba(0,18,45,.08); border-radius:10px; padding:6px 12px; display:flex; flex-direction:column; align-items:center; gap:2px;\"><div style=\"font-weight:800; font-size:19px;\">Block A<\u002Fdiv><div style=\"font-weight:500; font-size:11px; opacity:.65;\">Kategorie II<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div data-block=\"B\" onclick=\"{{ onPick }}\" onmouseenter=\"{{ onEnter }}\" style=\"flex:1.15; position:relative; box-sizing:border-box; border-radius:8px; background: {{ catIFill }}; border:1.5px solid {{ catIBorder }}; cursor:pointer; overflow:hidden; display:flex; align-items:center; justify-content:center; transition:transform .15s ease-out, box-shadow .15s ease-out; box-shadow: {{ rings.B }};\" style-hover=\"transform:translateY(-3px)\"><div style=\"position:absolute; inset:8px;\"><img src=\"{{ seatBg.B }}\" style=\"width:100%; height:100%; object-fit:contain; display:block;\"><\u002Fdiv><div style=\"position:relative; z-index:1; background:rgba(255,255,255,.82); border:1px solid rgba(0,18,45,.08); border-radius:10px; padding:6px 12px; display:flex; flex-direction:column; align-items:center; gap:2px;\"><div style=\"font-weight:800; font-size:19px;\">Block B<\u002Fdiv><div style=\"font-weight:600; font-size:11px;\">Kategorie I<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div data-block=\"C\" onclick=\"{{ onPick }}\" onmouseenter=\"{{ onEnter }}\" style=\"flex:1; position:relative; box-sizing:border-box; border-radius:8px; background:rgba(0,18,45,.05); border:1.5px solid rgba(0,18,45,.5); cursor:pointer; overflow:hidden; display:flex; align-items:center; justify-content:center; transition:transform .15s ease-out, box-shadow .15s ease-out; box-shadow: {{ rings.C }};\" style-hover=\"transform:translateY(-3px)\"><div style=\"position:absolute; inset:8px;\"><img src=\"{{ seatBg.C }}\" style=\"width:100%; height:100%; object-fit:fill; display:block;\"><\u002Fdiv><div style=\"position:relative; z-index:1; background:rgba(255,255,255,.8); border:1px solid rgba(0,18,45,.08); border-radius:10px; padding:6px 12px; display:flex; flex-direction:column; align-items:center; gap:2px;\"><div style=\"font-weight:800; font-size:19px;\">Block C<\u002Fdiv><div style=\"font-weight:500; font-size:11px; opacity:.65;\">Kategorie II<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"height:30px; background:#00122D; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; letter-spacing:.18em; text-transform:uppercase; border-radius:6px;\">Südtribüne<\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ entrances }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"width:66px; flex:none; position:relative;\">\n              <div style=\"position:absolute; left:0; right:0; top:439px; height:299px; background:linear-gradient(160deg,#3a4d8f,#242f63); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff;\"><div style=\"writing-mode:vertical-rl; transform:rotate(180deg); font-weight:800; font-size:14px;\">VIP-Bereich<\u002Fdiv><\u002Fdiv>\n              <div style=\"position:absolute; left:0; right:0; top:748px; height:126px; background:linear-gradient(160deg,#3a4d8f,#242f63); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff;\"><div style=\"writing-mode:vertical-rl; transform:rotate(180deg); font-weight:800; font-size:13px; letter-spacing:.01em;\">VIP-Eingang<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ tipShow }}\">\n        <div style=\"position:absolute; left: {{ tipX }}px; top: {{ tipY }}px; z-index:20; pointer-events:none; width:230px; background:#00122D; color:#fff; border-radius:12px; padding:14px 16px; box-shadow:0 16px 40px rgba(0,18,45,.35);\">\n          <div style=\"font-weight:800; font-size:17px; margin-bottom:2px;\">{{ tipName }}<\u002Fdiv>\n          <sc-if value=\"{{ tipTagShow }}\"><div style=\"display:inline-block; font-weight:600; font-size:11px; letter-spacing:.03em; text-transform:uppercase; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22); border-radius:999px; padding:2px 9px; margin-bottom:8px;\">{{ tipTag }}<\u002Fdiv><\u002Fsc-if>\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-top:6px; padding-top:8px; border-top:1px solid rgba(255,255,255,.14);\">\n            <span style=\"font-weight:500; font-size:13px; color:#cdd6e5;\">{{ tipCatLabel }}<\u002Fspan>\n            <span style=\"font-weight:900; font-size:20px; color:#E5710B;\">{{ tipPrice }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-weight:400; font-size:12.5px; color:#cdd6e5; margin-top:4px;\">{{ tipSeats }}<\u002Fdiv>\n          <sc-if value=\"{{ tipNoteShow }}\"><div style=\"font-weight:400; font-size:12px; color:#9fb0c9; margin-top:8px; line-height:1.35;\">{{ tipNote }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:940},&quot;catIColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E5710B&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Darstellung&quot;},&quot;showCourtMarkings&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Darstellung&quot;},&quot;showEntrances&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Darstellung&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { hovered:null, selected:null, booked:null, tipX:0, tipY:0 };\n    this.stageRef = React.createRef();\n  }\n  CATS = {\n    I:  { label:'Kategorie I',  price:'22 €' },\n    II: { label:'Kategorie II', price:'16 €' },\n  };\n  BLOCKS = {\n    D: { name:'Block D', side:'Nordtribüne', cat:'II', seats:'192 Plätze', tag:'Gästeblock',    reserved:false, note:'Freie Platzwahl außer Dauerkartenbesitzer' },\n    E: { name:'Block E', side:'Nordtribüne', cat:'I',  seats:'167 Plätze', tag:'',              reserved:false, note:'Freie Platzwahl außer Dauerkartenbesitzer' },\n    F: { name:'Block F', side:'Nordtribüne', cat:'II', seats:'190 Plätze', tag:'',              reserved:false, note:'Freie Platzwahl außer Dauerkartenbesitzer' },\n    A: { name:'Block A', side:'Südtribüne',  cat:'II', seats:'100 Plätze · +53 Fanbereich', tag:'',              reserved:false, note:'' },\n    B: { name:'Block B', side:'Südtribüne',  cat:'I',  seats:'122 Plätze · +46 res. Bereich', tag:'Nur VIP-Gäste', reserved:true,  note:'Reservierter Block für VIP-Gäste' },\n    C: { name:'Block C', side:'Südtribüne',  cat:'II', seats:'100 Plätze · +53 vordere Reihen', tag:'',              reserved:false, note:'' },\n  };\n  SEATS = {\n    D: [[28],[25],[25],[24],[20],[20],[20],[20],[10]],\n    E: [[7,11],[8,12],[9,13],[10,13],[21],[21],[21],[21]],\n    F: [[28],[24],[24],[24],[20],[20],[20],[20],[10]],\n    A: [[20],[20],[20],[20],[20]],\n    B: [[20],[20],[20],[20],[20],[22]],\n    C: [[20],[20],[20],[20],[20]],\n  };\n  FRONT = {\n    FA: [[12],[11],[11],[10],[9]],\n    FB: [[10],[10],[9],[9],[8]],\n    FC: [[12],[11],[11],[10],[9]],\n  };\n  seatDots(rows){\n    const step = 10, r = 2.5, gap = 16;\n    let maxW = 0;\n    rows.forEach(segs => {\n      const t = segs.reduce((a,b)=>a+b,0)*step + (segs.length-1)*gap;\n      if (t > maxW) maxW = t;\n    });\n    const H = rows.length*step;\n    let circ = '';\n    rows.forEach((segs, ri) => {\n      const t = segs.reduce((a,b)=>a+b,0)*step + (segs.length-1)*gap;\n      let x = (maxW - t)/2 + step/2;\n      const y = ri*step + step/2;\n      segs.forEach((n, si) => {\n        for (let i=0;i<n;i++){ circ += `<circle cx='${x.toFixed(1)}' cy='${y.toFixed(1)}' r='${r}'/>`; x += step; }\n        if (si < segs.length-1) x += gap;\n      });\n    });\n    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${maxW.toFixed(0)} ${H}' fill='#00122D' fill-opacity='0.5'>${circ}<\u002Fsvg>`;\n    return 'data:image/svg+xml,' + encodeURIComponent(svg);\n  }\n  hexToRgba(hex, a){\n    let h = String(hex || '#E5710B').replace('#','');\n    if (h.length === 3) h = h.split('').map(c => c + c).join('');\n    const n = parseInt(h, 16);\n    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;\n  }\n  onEnter = (e) => { const b = e.currentTarget.dataset.block; if (b) this.setState({ hovered:b }); };\n  onLeave = () => this.setState({ hovered:null });\n  onMove = (e) => {\n    const el = this.stageRef.current; if (!el) return;\n    const r = el.getBoundingClientRect();\n    let x = e.clientX - r.left + 18;\n    let y = e.clientY - r.top + 18;\n    x = Math.min(x, el.clientWidth - 246);\n    this.setState({ tipX:x, tipY:y });\n  };\n  onPick = (e) => { const b = e.currentTarget.dataset.block; if (b) this.setState({ selected:b, booked:null }); };\n  onBook = () => { if (this.state.selected) this.setState({ booked:this.state.selected }); };\n  renderVals(){\n    const { hovered, selected, booked, tipX, tipY } = this.state;\n    const catIColor = this.props.catIColor ?? '#E5710B';\n    const ring = (id) => selected===id\n      ? '0 0 0 4px rgba(0,40,170,.9), 0 14px 34px rgba(0,18,45,.20)'\n      : (hovered===id ? '0 10px 24px rgba(0,18,45,.16)' : 'none');\n\n    const cur = hovered || selected;\n    const info = cur ? this.BLOCKS[cur] : null;\n    const infoCat = info ? this.CATS[info.cat] : null;\n    const tip = hovered ? this.BLOCKS[hovered] : null;\n    const tipCat = tip ? this.CATS[tip.cat] : null;\n    const sel = selected ? this.BLOCKS[selected] : null;\n\n    return {\n      stageRef:this.stageRef,\n      onEnter:this.onEnter, onLeave:this.onLeave, onMove:this.onMove, onPick:this.onPick, onBook:this.onBook,\n      catIFill: this.hexToRgba(catIColor, 0.6),\n      catIBorder: this.hexToRgba(catIColor, 0.85),\n      courtMarks: this.props.showCourtMarkings ?? true,\n      entrances:  this.props.showEntrances ?? true,\n      rings: { A:ring('A'), B:ring('B'), C:ring('C'), D:ring('D'), E:ring('E'), F:ring('F') },\n      seatBg: {\n        D:this.seatDots(this.SEATS.D), E:this.seatDots(this.SEATS.E), F:this.seatDots(this.SEATS.F),\n        A:this.seatDots(this.SEATS.A), B:this.seatDots(this.SEATS.B), C:this.seatDots(this.SEATS.C),\n        FA:this.seatDots(this.FRONT.FA), FB:this.seatDots(this.FRONT.FB), FC:this.seatDots(this.FRONT.FC),\n      },\n\n      tipShow: !!tip, tipX, tipY,\n      tipName: tip ? tip.name : '',\n      tipTag: tip ? tip.tag : '', tipTagShow: !!(tip && tip.tag),\n      tipCatLabel: tipCat ? tipCat.label : '',\n      tipPrice: tipCat ? tipCat.price : '',\n      tipSeats: tip ? tip.seats : '',\n      tipNote: tip ? tip.note : '', tipNoteShow: !!(tip && tip.note),\n\n      hasInfo: !!info, noInfo: !info,\n      pName: info ? info.name : '',\n      pMeta: infoCat ? (infoCat.label + ' · ' + infoCat.price + ' · ' + info.seats) : '',\n      pNote: info ? info.note : '', pNoteShow: !!(info && info.note),\n\n      hasSel: !!sel,\n      selName: sel ? sel.name : '',\n      selBookable: !!(sel && !sel.reserved),\n      selReserved: !!(sel && sel.reserved),\n      booked: !!booked,\n      bookedName: booked ? this.BLOCKS[booked].name : '',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
