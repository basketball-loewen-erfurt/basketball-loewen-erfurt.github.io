<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warenkorb — Basketball Löwen Erfurt</title>
<meta name="description" content="Käuferdaten für deine Bestellung bei den Basketball Löwen Erfurt." />
<link rel="icon" href="/assets/logo/loewen-logo-4c.svg" />
<link rel="stylesheet" href="/css/colors_and_type.css?v=1783524771" />
<link rel="stylesheet" href="/css/site.css?v=1783524771" />
<link rel="stylesheet" href="/css/seat-picker.css?v=1783524771" />
<style>
  .checkout-grid { display: grid; grid-template-columns: 380px 1fr; gap: 32px; align-items: start; }
  #order-summary-card { position: sticky; top: 20px; }
  @media (max-width: 900px) {
    .checkout-grid { grid-template-columns: 1fr; }
    #order-summary-card { position: static; }
  }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .field input, .field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-md);
    font-family: inherit; font-size: 14px;
  }
  .field textarea { resize: vertical; }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-muted); opacity: .7; }
  .field input:focus, .field textarea:focus { outline: 2px solid var(--color-brand-blue); outline-offset: 1px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .billing-address {
    border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 2px 12px; margin-bottom: 12px;
  }
  .billing-address summary {
    padding: 8px 0; font-size: 13px; font-weight: 600; cursor: pointer; list-style: none;
    display: flex; align-items: center; gap: 6px;
  }
  .billing-address summary .t-caption { font-weight: 400; }
  .billing-address summary::-webkit-details-marker { display: none; }
  .billing-address summary::before { content: '+'; font-size: 16px; color: var(--color-brand-orange); }
  .billing-address[open] summary::before { content: '−'; }
  .billing-address .billing-address-fields { padding: 2px 0 12px; }
  .field-checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 4px 0 12px; cursor: pointer; }
  .field-checkbox input { width: 16px; height: 16px; accent-color: var(--color-brand-orange); flex-shrink: 0; }

  .process-chain { display: flex; align-items: flex-start; justify-content: center; gap: 0; margin: 24px 0 4px; flex-wrap: wrap; }
  .process-step { display: flex; align-items: center; }
  .process-step .dot {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; background: #fff; border: 2px solid var(--border-strong); color: var(--text-muted); flex-shrink: 0;
  }
  .process-step .label { margin-left: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .process-step.done .dot { background: var(--color-brand-orange); border-color: var(--color-brand-orange); color: #fff; }
  .process-step.done .label { color: var(--text-primary); }
  .process-step.active .dot { border-color: var(--color-brand-orange); color: var(--color-brand-orange); }
  .process-step.active .label { color: var(--text-primary); }
  .process-connector { width: 32px; height: 2px; background: var(--border-strong); margin: 0 8px; align-self: center; }
  .process-connector.done { background: var(--color-brand-orange); }
  .voucher-box { margin: 14px 0; }
  .voucher-input-row { display: flex; gap: 8px; }
  .voucher-input-row input {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-md);
    font-family: inherit; font-size: 13px; text-transform: uppercase;
  }
  .voucher-input-row input::placeholder { text-transform: none; color: var(--text-muted); opacity: .7; }
  .voucher-input-row input:focus { outline: 2px solid var(--color-brand-blue); outline-offset: 1px; }
  .voucher-message { font-size: 12px; margin: 6px 0 0; }
  .voucher-message.success { color: #1B8A3D; }
  .voucher-message.error { color: #b3392c; }
  .seatplan-cart-item.discount { color: #1B8A3D; }
</style>
</head>
<body data-nav-group="" class="hide-mobile-cta">
<a class="skip-link" href="#main">Zum Inhalt springen</a>
<div id="site-header-placeholder"></div>
<main id="main">

  <section class="section-sm bg-subtle" style="padding-bottom:28px">
    <div class="container" style="text-align:center">
      <span class="eyebrow">Warenkorb</span>
      <h1 class="t-h2" style="margin:6px 0 20px">Käuferdaten</h1>
      <div class="process-chain">
        <div class="process-step done"><span class="dot">✓</span><span class="label">Produktauswahl</span></div>
        <div class="process-connector done"></div>
        <div class="process-step active"><span class="dot">2</span><span class="label">Käuferdaten</span></div>
        <div class="process-connector"></div>
        <div class="process-step"><span class="dot">3</span><span class="label">Zahlung</span></div>
        <div class="process-connector"></div>
        <div class="process-step"><span class="dot">4</span><span class="label">Bestätigung</span></div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <div id="checkout-empty" class="card" style="padding:24px;display:none">
        <p class="t-body-sm">Es liegt noch keine Auswahl vor. <a href="/tickets.html">Zurück zu den Tickets</a>.</p>
      </div>

      <div id="checkout-content" class="checkout-grid" style="display:none">
        <div class="card" id="order-summary-card" style="padding:24px;background:var(--bg-subtle)">
          <h3 class="t-h4" style="margin-bottom:4px">Deine Bestellung</h3>
          <p class="t-caption" style="color:var(--text-muted);margin-bottom:14px" id="checkout-event-label"></p>
          <div id="checkout-lines"></div>

          <div class="voucher-box">
            <div class="voucher-input-row">
              <input type="text" id="voucher-input" placeholder="Gutschein-Code">
              <button type="button" class="btn btn-ghost btn-sm" id="voucher-apply">Einlösen</button>
            </div>
            <p class="voucher-message" id="voucher-message"></p>
          </div>

          <div class="seatplan-cart-total"><span>Gesamt</span><span id="checkout-total">0 €</span></div>
        </div>

        <div class="card" style="padding:24px">
          <h3 class="t-h4" style="margin-bottom:14px">Deine Daten</h3>
          <form id="checkout-form">
            <div class="field">
              <label for="cf-email">E-Mail *</label>
              <input type="email" id="cf-email" name="email" required autocomplete="email" placeholder="für Ticket, Bestätigung & Rechnung">
            </div>
            <div class="field field-row">
              <div>
                <label for="cf-vorname">Vorname</label>
                <input type="text" id="cf-vorname" name="vorname" autocomplete="given-name">
              </div>
              <div>
                <label for="cf-nachname">Nachname</label>
                <input type="text" id="cf-nachname" name="nachname" autocomplete="family-name">
              </div>
            </div>

            <div class="field">
              <label for="cf-notiz">Notiz zur Bestellung</label>
              <textarea id="cf-notiz" name="notiz" rows="2" placeholder="z. B. Schulklasse 3c, Grundschule Gispersleben"></textarea>
            </div>

            <details class="billing-address">
              <summary>Rechnungsadresse eingeben <span class="t-caption">(optional)</span></summary>
              <div class="billing-address-fields">
                <div class="field">
                  <label for="cf-firma">Firma / Unternehmen (falls abweichend)</label>
                  <input type="text" id="cf-firma" name="firma" autocomplete="organization" placeholder="z. B. für Firmenrechnung">
                </div>
                <div class="field">
                  <label for="cf-strasse">Straße und Hausnummer</label>
                  <input type="text" id="cf-strasse" name="strasse" autocomplete="street-address" placeholder="Musterstraße 1">
                </div>
                <div class="field field-row">
                  <div>
                    <label for="cf-plz">PLZ</label>
                    <input type="text" id="cf-plz" name="plz" autocomplete="postal-code" inputmode="numeric" placeholder="99089">
                  </div>
                  <div>
                    <label for="cf-ort">Ort</label>
                    <input type="text" id="cf-ort" name="ort" autocomplete="address-level2" placeholder="Erfurt">
                  </div>
                </div>
              </div>
            </details>

            <label class="field-checkbox">
              <input type="checkbox" id="cf-newsletter" name="newsletter">
              <span>Newsletter abonnieren</span>
            </label>

            <button class="btn btn-primary btn-sm" type="submit" style="width:100%;justify-content:center;margin-top:8px">Weiter zur Zahlung</button>
          </form>
        </div>
      </div>

    </div>
  </section>

</main>
<div id="site-footer-placeholder"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="/js/nav.js?v=1783524771"></script>
<script src="/js/include.js?v=1783524771"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var raw = sessionStorage.getItem('bl_cart');
    var cart = null;
    try { cart = raw ? JSON.parse(raw) : null; } catch (e) {}

    if (!cart || !cart.lines || cart.lines.length === 0) {
      document.getElementById('checkout-empty').style.display = 'block';
      return;
    }
    document.getElementById('checkout-content').style.display = 'grid';
    document.getElementById('checkout-event-label').textContent = cart.eventLabel;

    /* Gutschein-Codes sind noch nicht an pretix angebunden — feste Testcodes,
       damit sich der Ablauf (einlösen, Rabattzeile, entfernen) schon jetzt echt
       durchklicken lässt. Dieselben Codes wie im SeatPicker (js/seat-picker.js).
       cart.lines/cart.total sind die einzige Wahrheitsquelle — ein Gutschein kann
       schon auf der Auswahlseite eingelöst worden sein (dann steckt die Rabattzeile
       schon in cart.lines) oder erst hier. */
    var MOCK_VOUCHERS = {
      'LOEWEN10': { type: 'percent', value: 10, label: 'LOEWEN10 (10 %)' },
      'WILLKOMMEN5': { type: 'fixed', value: 5, label: 'WILLKOMMEN5 (5 €)' }
    };

    var linesEl = document.getElementById('checkout-lines');
    var totalEl = document.getElementById('checkout-total');
    var voucherBoxEl = document.querySelector('.voucher-box');
    var voucherInput = document.getElementById('voucher-input');
    var voucherMsg = document.getElementById('voucher-message');
    var voucherBtn = document.getElementById('voucher-apply');

    function findVoucherLineIndex() {
      return cart.lines.findIndex(function (l) { return l.label.indexOf('Gutschein ') === 0; });
    }

    function renderSummary() {
      var html = cart.lines.map(function (l) {
        var isVoucher = l.label.indexOf('Gutschein ') === 0;
        return '<div class="seatplan-cart-item' + (isVoucher ? ' discount' : '') + '">' +
          '<div>' + (!isVoucher && l.qty > 1 ? l.qty + '× ' : '') + l.label + '</div>' +
          '<div class="seatplan-cart-item-right"><span>' + (l.lineTotal < 0 ? '−' + Math.abs(l.lineTotal) : l.lineTotal) + ' €</span>' +
          (isVoucher ? '<button type="button" id="voucher-remove">entfernen</button>' : '') +
        '</div></div>';
      }).join('');
      linesEl.innerHTML = html;
      totalEl.textContent = cart.total + ' €';

      var hasVoucher = findVoucherLineIndex() !== -1;
      voucherBoxEl.style.display = hasVoucher ? 'none' : '';

      var removeBtn = document.getElementById('voucher-remove');
      if (removeBtn) {
        removeBtn.addEventListener('click', function () {
          var idx = findVoucherLineIndex();
          if (idx !== -1) {
            cart.total -= cart.lines[idx].lineTotal;
            cart.lines.splice(idx, 1);
          }
          voucherInput.value = '';
          voucherMsg.textContent = '';
          voucherMsg.className = 'voucher-message';
          renderSummary();
        });
      }
    }
    renderSummary();

    voucherBtn.addEventListener('click', function () {
      var code = voucherInput.value.trim().toUpperCase();
      if (!code) return;
      var voucher = MOCK_VOUCHERS[code];
      if (voucher) {
        var discount = voucher.type === 'percent'
          ? Math.round(cart.total * voucher.value) / 100
          : Math.min(voucher.value, cart.total);
        cart.lines.push({ label: 'Gutschein ' + voucher.label, qty: 1, unitPrice: -discount, lineTotal: -discount });
        cart.total = Math.max(0, cart.total - discount);
        voucherMsg.textContent = 'Gutschein eingelöst.';
        voucherMsg.className = 'voucher-message success';
        renderSummary();
      } else {
        voucherMsg.textContent = 'Dieser Gutschein-Code ist ungültig oder abgelaufen.';
        voucherMsg.className = 'voucher-message error';
      }
    });
    voucherInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); voucherBtn.click(); }
    });

    document.getElementById('checkout-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var buyer = {
        email: document.getElementById('cf-email').value.trim(),
        vorname: document.getElementById('cf-vorname').value.trim(),
        nachname: document.getElementById('cf-nachname').value.trim(),
        notiz: document.getElementById('cf-notiz').value.trim(),
        firma: document.getElementById('cf-firma').value.trim(),
        strasse: document.getElementById('cf-strasse').value.trim(),
        plz: document.getElementById('cf-plz').value.trim(),
        ort: document.getElementById('cf-ort').value.trim(),
        newsletter: document.getElementById('cf-newsletter').checked
      };
      sessionStorage.setItem('bl_buyer', JSON.stringify(buyer));
      sessionStorage.setItem('bl_cart', JSON.stringify(cart));
      window.location.href = '/tickets/payment.html';
    });
  });
</script>
</body>
</html>
