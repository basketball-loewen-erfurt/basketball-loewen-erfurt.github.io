<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zahlung — Basketball Löwen Erfurt</title>
<meta name="description" content="Zahlung für deine Bestellung bei den Basketball Löwen Erfurt." />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/assets/logo/loewen-logo-4c.svg" />
<link rel="stylesheet" href="/css/colors_and_type.css?v=1783623498" />
<link rel="stylesheet" href="/css/site.css?v=1783623498" />
<link rel="stylesheet" href="/css/seat-picker.css?v=1783623498" />
<style>
  .checkout-grid { display: grid; grid-template-columns: 380px 1fr; gap: 32px; align-items: start; }
  #order-summary-card { position: sticky; top: 20px; }
  @media (max-width: 900px) {
    .checkout-grid { grid-template-columns: 1fr; }
    #order-summary-card { position: static; }
  }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .field input {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-md);
    font-family: inherit; font-size: 14px;
  }
  .field input::placeholder { color: var(--text-muted); opacity: .7; }
  .field input:focus { outline: 2px solid var(--color-brand-blue); outline-offset: 1px; }
  .field-checkbox { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin: 10px 0 12px; cursor: pointer; }
  .field-checkbox input { width: 16px; height: 16px; accent-color: var(--color-brand-orange); flex-shrink: 0; margin-top: 2px; }

  .process-chain { display: flex; align-items: flex-start; justify-content: center; gap: 0; margin: 24px 0 4px; flex-wrap: wrap; }
  .process-step { display: flex; align-items: center; }
  .process-step .dot {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; background: #fff; border: 2px solid var(--border-strong); color: var(--text-muted); flex-shrink: 0;
  }
  .process-step .label { margin-left: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .process-step.done .dot { background: var(--color-brand-orange); border-color: var(--color-brand-orange); color: #fff; }
  .process-step.done .label { color: var(--text-primary); }
  .process-step.active .dot { border-color: var(--color-brand-orange); color: var(--color-brand-orange); }
  .process-step.active .label { color: var(--text-primary); }
  .process-connector { width: 32px; height: 2px; background: var(--border-strong); margin: 0 8px; align-self: center; }
  .process-connector.done { background: var(--color-brand-orange); }
  .seatplan-cart-item.discount { color: #1B8A3D; }

  .payment-method-card {
    display: flex; align-items: flex-start; gap: 12px; border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px; cursor: pointer;
  }
  .payment-method-card:has(input:checked) { border-color: var(--color-brand-orange); background: #fdf7f1; }
  .payment-method-card input { margin-top: 3px; width: 16px; height: 16px; accent-color: var(--color-brand-orange); flex-shrink: 0; }
  .payment-method-card strong { display: block; font-size: 14px; }
  .payment-method-card .t-caption { display: block; color: var(--text-muted); margin-top: 2px; }
  .payment-method-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: #fff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #sepa-fields { border-top: 1px dashed var(--border); margin-top: 4px; padding-top: 14px; }
</style>
</head>
<body data-nav-group="" class="hide-mobile-cta">
<a class="skip-link" href="#main">Zum Inhalt springen</a>
<div id="site-header-placeholder"></div>
<main id="main">

  <section class="section-sm bg-subtle" style="padding-bottom:28px">
    <div class="container" style="text-align:center">
      <span class="eyebrow">Warenkorb</span>
      <h1 class="t-h2" style="margin:6px 0 20px">Zahlung</h1>
      <div class="process-chain">
        <div class="process-step done"><span class="dot">✓</span><span class="label">Produktauswahl</span></div>
        <div class="process-connector done"></div>
        <div class="process-step done"><span class="dot">✓</span><span class="label">Käuferdaten</span></div>
        <div class="process-connector done"></div>
        <div class="process-step active"><span class="dot">3</span><span class="label">Zahlung</span></div>
        <div class="process-connector"></div>
        <div class="process-step"><span class="dot">4</span><span class="label">Bestätigung</span></div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <div id="payment-empty" class="card" style="padding:24px;display:none">
        <p class="t-body-sm">Es liegt noch keine Bestellung vor. <a href="/tickets.html">Zurück zu den Tickets</a>.</p>
      </div>

      <div id="payment-content" class="checkout-grid" style="display:none">
        <div class="card" id="order-summary-card" style="padding:24px;background:var(--bg-subtle)">
          <h3 class="t-h4" style="margin-bottom:4px">Deine Bestellung</h3>
          <p class="t-caption" style="color:var(--text-muted);margin-bottom:14px" id="payment-event-label"></p>
          <div id="payment-lines"></div>
          <div class="seatplan-cart-total"><span>Gesamt</span><span><span id="payment-total">0,00 €</span> <span id="payment-vat-note" style="font-weight:400;font-size:12px;color:var(--text-muted);display:none"></span></span></div>
        </div>

        <div class="card" style="padding:24px">
          <h3 class="t-h4" style="margin-bottom:14px">Zahlungsmethode wählen</h3>
          <form id="payment-form">
            <label class="payment-method-card" id="pm-paypal">
              <input type="radio" name="paymethod" value="paypal" checked>
              <span class="payment-method-icon"><i data-lucide="wallet" style="width:16px;height:16px;color:var(--color-brand-blue)"></i></span>
              <span>
                <strong>PayPal</strong>
                <span class="t-caption">Bezahle sicher mit deinem PayPal-Konto oder per Kreditkarte.</span>
              </span>
            </label>

            <label class="payment-method-card" id="pm-sepa" style="display:none">
              <input type="radio" name="paymethod" value="sepa">
              <span class="payment-method-icon"><i data-lucide="landmark" style="width:16px;height:16px;color:var(--color-brand-blue)"></i></span>
              <span>
                <strong>SEPA-Lastschrift</strong>
                <span class="t-caption" id="pm-sepa-caption">Bequem per Bankeinzug — für Dauerkarten verfügbar.</span>
              </span>
            </label>

            <div id="sepa-fields" style="display:none">
              <div class="field">
                <label for="pf-kontoinhaber">Kontoinhaber *</label>
                <input type="text" id="pf-kontoinhaber" placeholder="Vor- und Nachname">
              </div>
              <div class="field">
                <label for="pf-iban">IBAN *</label>
                <input type="text" id="pf-iban" placeholder="DE68 8205 1000 0163 1313 76">
              </div>
              <label class="field-checkbox">
                <input type="checkbox" id="pf-sepa-mandat">
                <span>Ich erteile den Basketball Löwen e.V. das Mandat, den Rechnungsbetrag per SEPA-Lastschrift von oben genanntem Konto einzuziehen.</span>
              </label>
            </div>

            <p class="t-caption" style="color:var(--text-muted);margin:14px 0">Mit dem Absenden akzeptierst du unsere <a href="/agb.html">AGB</a> und die <a href="/datenschutz.html">Datenschutzerklärung</a>.</p>

            <button class="btn btn-primary btn-sm" type="submit" id="pay-btn" style="width:100%;justify-content:center">Jetzt bezahlen</button>
          </form>
        </div>
      </div>

    </div>
  </section>

</main>
<div id="site-footer-placeholder"></div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="/js/nav.js?v=1783623498"></script>
<script src="/js/include.js?v=1783623498"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var raw = sessionStorage.getItem('bl_cart');
    var cart = null;
    try { cart = raw ? JSON.parse(raw) : null; } catch (e) {}

    if (!cart || !cart.lines || cart.lines.length === 0) {
      document.getElementById('payment-empty').style.display = 'block';
      return;
    }
    document.getElementById('payment-content').style.display = 'grid';
    document.getElementById('payment-event-label').textContent = cart.eventLabel;

    var linesEl = document.getElementById('payment-lines');
    function formatMoney(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

    linesEl.innerHTML = cart.lines.map(function (l) {
      var isVoucher = l.label.indexOf('Gutschein ') === 0;
      return '<div class="seatplan-cart-item' + (isVoucher ? ' discount' : '') + '">' +
        '<div>' + (!isVoucher && l.qty > 1 ? l.qty + '× ' : '') + l.label + '</div>' +
        '<div class="seatplan-cart-item-right"><span>' + (l.lineTotal < 0 ? '−' + formatMoney(Math.abs(l.lineTotal)) : formatMoney(l.lineTotal)) + '</span></div>' +
      '</div>';
    }).join('');
    document.getElementById('payment-total').textContent = formatMoney(cart.total);
    var paymentVatNoteEl = document.getElementById('payment-vat-note');
    paymentVatNoteEl.textContent = cart.vatNote || '';
    paymentVatNoteEl.style.display = cart.vatNote ? '' : 'none';
    document.getElementById('pay-btn').textContent = 'Jetzt ' + cart.total.toFixed(2).replace('.', ',') + ' € bezahlen';

    if (cart.productType === 'dauerkarte') {
      document.getElementById('pm-sepa').style.display = 'flex';
    }

    /* Löwen-Unterstützer-Pakete: ausschließlich SEPA-Lastschrift, kein PayPal —
       passt zur B2B-Rechnungslogik statt Endkunden-Checkout. */
    if (cart.productType === 'loewen-unterstuetzer') {
      document.getElementById('pm-paypal').style.display = 'none';
      document.getElementById('pm-sepa').style.display = 'flex';
      document.getElementById('pm-sepa-caption').textContent = 'Bequem und sicher per Bankeinzug.';
      document.querySelector('input[value="sepa"]').checked = true;
      document.getElementById('sepa-fields').style.display = 'block';
    }

    var sepaFields = document.getElementById('sepa-fields');
    document.querySelectorAll('input[name="paymethod"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        sepaFields.style.display = (this.value === 'sepa' && this.checked) ? 'block' : 'none';
      });
    });

    document.getElementById('payment-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var method = document.querySelector('input[name="paymethod"]:checked').value;
      if (method === 'sepa') {
        var kontoinhaber = document.getElementById('pf-kontoinhaber').value.trim();
        var iban = document.getElementById('pf-iban').value.trim();
        var mandat = document.getElementById('pf-sepa-mandat').checked;
        if (!kontoinhaber || !iban || !mandat) {
          alert('Bitte Kontoinhaber, IBAN und das SEPA-Mandat ausfüllen.');
          return;
        }
      }

      var raw = sessionStorage.getItem('bl_buyer');
      var buyer = null;
      try { buyer = raw ? JSON.parse(raw) : null; } catch (e2) {}

      var order = {
        orderNumber: 'BL' + Math.floor(100000 + Math.random() * 900000),
        cart: cart,
        buyer: buyer,
        paymentMethod: method
      };
      sessionStorage.setItem('bl_order', JSON.stringify(order));
      window.location.href = '/tickets/confirmation.html';
    });
  });
</script>
</body>
</html>
