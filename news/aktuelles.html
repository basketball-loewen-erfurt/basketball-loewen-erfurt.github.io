<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aktuelles — Basketball Löwen Erfurt</title>
<meta name="description" content="Alle News der Basketball Löwen Erfurt." />
<link rel="icon" href="/assets/logo/loewen-logo-4c.svg" />
<link rel="stylesheet" href="/css/colors_and_type.css?v=1783258370" />
<link rel="stylesheet" href="/css/site.css?v=1783258370" />
</head>
<body data-nav-group="news">
<a class="skip-link" href="#main">Zum Inhalt springen</a>
<div id="site-header-placeholder"></div>
<main id="main">
  <section class="hero-photo">
    <div class="container">
    <span class="eyebrow">News</span>
    <h1>Aktuelles.</h1>
    <p class="lead">Was bei den Löwen los ist.</p>
    </div>
    <span class="photo-note">Platzhalterbild — echtes Pressefoto folgt</span>
  </section>
  <section class="section">
    <div class="container grid-3" id="news-grid"></div>
  </section>
</main>
<div id="site-footer-placeholder"></div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/js/nav.js?v=1783258370"></script>
<script src="/js/include.js?v=1783258370"></script>
<script>
  // Alle Artikel aus /data/news.json rendern (ungefiltert — das "topNews"-Flag
  // steuert nur den Top-News-Bereich auf der Startseite, nicht diese Übersicht).
  fetch('/data/news.json').then(function (r) { return r.json(); }).then(function (d) {
    var grid = document.getElementById('news-grid');
    grid.innerHTML = d.artikel.map(function (a) {
      var label = a.datum ? (a.datum + ' · ' + a.kategorie) : a.kategorie;
      return '<div class="card hoverable">' +
        '<div class="card-media ' + a.tint + '"><i data-lucide="' + a.icon + '" style="width:32px;height:32px"></i></div>' +
        '<div class="card-body">' +
          '<span class="card-label">' + label + '</span>' +
          '<h3 style="font-size:18px">' + a.titel + '</h3>' +
          '<p>' + a.kurztext + '</p>' +
          '<a class="card-link" href="' + a.url + '">weiterlesen <i data-lucide="arrow-right" style="width:14px;height:14px"></i></a>' +
        '</div>' +
      '</div>';
    }).join('');
    if (window.lucide) { lucide.createIcons(); }
  });
</script>
</body>
</html>
